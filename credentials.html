<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credentials - Shift-X</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <h2>Add Credential</h2>

  <label>Select Worker</label>

  <select id="worker">

    <option value="">
      Select Worker
    </option>

  </select>

  <br><br>

  <label>Credential Type</label>

  <input
    type="text"
    id="credentialType"
    placeholder="CPR, First Aid, Police Check">

  <label>Expiry Date</label>

  <input
    type="date"
    id="expiryDate">

  <button
    class="btn"
    onclick="addCredential()">

    Save Credential

  </button>

  <br><br>

  <a
    href="dashboard.html"
    class="btn">

    Back To Dashboard

  </a>

  <h2>Credential List</h2>

  <div id="credentialList"></div>

</div>

<script type="module" src="js/credentials.js"></script>

</body>
</html>
