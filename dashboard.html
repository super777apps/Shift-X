<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shift-X Dashboard</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>Shift-X Dashboard</h1>
</header>

<div class="container">

  <!-- ===== ALERT TITLE ===== -->
  <h3>⚠ Compliance Alerts</h3>

  <!-- ===== STATS ROW (FIXED LAYOUT) ===== -->
  <div class="stats-grid">

    <div class="stat-card">
      <span id="workerCount">0</span>
      <p>Workers</p>
    </div>

    <div class="stat-card">
      <span id="credentialCount">0</span>
      <p>Credentials</p>
    </div>

    <div class="stat-card">
      <span id="shiftCount">0</span>
      <p>Shifts</p>
    </div>

    <div class="stat-card">
      <span id="expiringCount">0</span>
      <p>Expiring</p>
    </div>

    <div class="stat-card">
      <span id="expiredCount">0</span>
      <p>Expired</p>
    </div>

  </div>

  <br>

  <!-- ===== NAV CARDS ===== -->
  <div class="grid">

    <a class="card" href="shifts.html">
      <h2>Shift Broadcast</h2>
      <p>Create and manage shifts</p>
    </a>

    <a class="card" href="workers.html">
      <h2>Workers</h2>
      <p>Manage workforce</p>
    </a>

    <a class="card" href="credentials.html">
      <h2>Credentials</h2>
      <p>Track expiry dates</p>
    </a>

  </div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
