<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shift-X</title>

  <link rel="stylesheet" href="css/style.css">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#ffd700">

  <link rel="apple-touch-icon" href="icon-192.png">

</head>

<body>

<div class="container center">

  <img
    src="logohead.jpg"
    alt="Shift-X Logo"
    class="logo-header">

  <p>
    Shift Sharing & Credential Tracking For NDIS Providers
  </p>

  <br>

  <button
    id="installBtn"
    class="btn">

    📱 Install Shift-X App

  </button>

  <p id="installMessage">

    Install Shift-X on your phone for quick access.

  </p>

  <div style="margin-top:30px;">

    <h2>Login</h2>

    <input
      type="email"
      id="email"
      placeholder="Email">

<input
  type="password"
  id="password"
  placeholder="Password">
 <p style="text-align:right; margin-top:5px;">
  <a href="#" id="forgotPasswordLink" style="color:#ffd700;">
    Forgot Password?
  </a>
</p>

    <button
      class="btn"
      onclick="login()">

      Login

    </button>

    <p id="message"></p>

    <p style="margin-top:20px;">

      Don't have an account?

      <a
        href="register.html"
        style="color:#ffd700;">

        Create Account

      </a>

    </p>

  </div>

</div>

<script type="module" src="js/auth.js"></script>

<script>

if ("serviceWorker" in navigator) {

  navigator.serviceWorker
    .register("./sw.js")
    .then(() => {

      console.log("SW Registered");

    });

}

let deferredPrompt = null;

window.addEventListener(
  "beforeinstallprompt",
  (e) => {

    e.preventDefault();

    deferredPrompt = e;

  }
);

document
  .getElementById("installBtn")
  .addEventListener(
    "click",
    async () => {

      if (deferredPrompt) {

        deferredPrompt.prompt();

        await deferredPrompt.userChoice;

      } else {

        alert(
          "Android: Open browser menu and choose Install App or Add To Home Screen.\n\n" +
          "iPhone: Tap Share → Add To Home Screen."
        );

      }

    }
  );

</script>

</body>
</html>
