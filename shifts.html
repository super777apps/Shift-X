<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shifts</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h2>Create Shift</h2>

  <input type="text" id="title" placeholder="Shift Title">
  <input type="date" id="date">
  <input type="time" id="time">
  <input type="text" id="suburb" placeholder="Suburb">

  <textarea id="notes" placeholder="Notes"></textarea>

  <button class="btn" onclick="addShift()">Create Shift</button>

  <h2>Open Shifts</h2>

  <div id="shiftList"></div>

</div>

<script type="module" src="js/shifts.js"></script>
</body>
</html>
