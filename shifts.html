<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shift Broadcast - Shift-X</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">
  
  <a href="dashboard.html" class="btn">
  Back To Dashboard
</a>
  

  <h2>Create Shift</h2>

  <label>Shift Title</label>
  <input type="text" id="title" placeholder="Personal Care Support">

  <label>Date</label>
  <input type="date" id="date">

  <label>Start Time</label>
  <input type="time" id="startTime">

  <label>End Time</label>
  <input type="time" id="endTime">

  <label>Suburb</label>
  <input type="text" id="suburb" placeholder="Liverpool">

  <label>Required Skills</label>
  <input type="text" id="skills" placeholder="Personal Care, SIL">

  <label>Notes</label>
  <textarea id="notes" placeholder="Shift notes"></textarea>

  <label>
    <input type="checkbox" id="broadcast">
    Broadcast To Network
  </label>

  <br><br>

<input
  type="hidden"
  id="editShiftId">

<button
  id="saveShiftBtn"
  class="btn"
  onclick="addShift()">

  Create Shift

</button>

  <br><br>



  <a href="shared-shifts.html" class="btn">
    Shared Shifts
  </a>

  <h2>My Shifts</h2>

  <div id="shiftList"></div>

</div>

<script type="module" src="js/shifts.js"></script>

</body>
</html>
